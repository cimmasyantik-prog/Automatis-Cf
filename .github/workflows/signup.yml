name: Cloudflare Auto-Signup (DrissionPage)

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Email for Cloudflare signup'
        required: true
      password:
        description: 'Password (leave empty to auto-generate)'
        required: false
        default: ''
      telegram_chat_id:
        description: 'Telegram Chat ID to notify result'
        required: true

jobs:
  signup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run Cloudflare Signup
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          xvfb-run --server-args="-screen 0 1920x1080x24" python signup.py \
            --email "${{ github.event.inputs.email }}" \
            --password "${{ github.event.inputs.password }}" \
            --headless \
            --telegram-chat-id "${{ github.event.inputs.telegram_chat_id }}" 2>&1 | tee output.log

          # Send result to Telegram
          python notify_telegram.py \
            --chat-id "${{ github.event.inputs.telegram_chat_id }}" \
            --bot-token "$TELEGRAM_BOT_TOKEN" \
            --output-file /dev/stdin <<< "$(grep '"status"' output.log | tail -1)"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: /tmp/*.png

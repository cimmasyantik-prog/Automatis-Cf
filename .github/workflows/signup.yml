name: Cloudflare Auto-Signup (Camoufox)

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Email for signup (Ammail format)'
        required: true
      password:
        description: 'Password for Cloudflare account'
        required: true
      ammail_base_url:
        description: 'Ammail Base URL API'
        required: true
        default: 'https://ammail.klipers.site'
      ammail_domain:
        description: 'Ammail Domain for temp inbox'
        required: true
        default: 'amstream.pro'
      telegram_chat_id:
        description: 'Telegram Chat ID to notify result'
        required: true

jobs:
  signup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install --with-deps firefox

      - name: Install Camoufox
        run: |
          pip install camoufox
          python -m camoufox fetch

      - name: Run Cloudflare Signup Script
        env:
          TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
          AMMAIL_API_KEY: ${{ secrets.AMMAIL_API_KEY }}
        run: |
          # Jalankan xvfb agar Camoufox virtual display bisa berjalan
          sudo apt-get update && sudo apt-get install -y xvfb
          
          # Jalankan dengan xvfb-run dan flag --headless agar Camoufox jalan di GUI virtual
          xvfb-run --server-args="-screen 0 1280x1024x24" python cloudflare_signup.py \
            --email "${{ github.event.inputs.email }}" \
            --password "${{ github.event.inputs.password }}" \
            --ammail-base-url "${{ github.event.inputs.ammail_base_url }}" \
            --ammail-api-key "$AMMAIL_API_KEY" \
            --ammail-domain "${{ github.event.inputs.ammail_domain }}" \
            --2captcha-key "$TWOCAPTCHA_API_KEY" > output.json 2>&1 || true
          
          cat output.json
          
          # Kirim hasil ke Telegram
          python notify_telegram.py \
            --chat-id "${{ github.event.inputs.telegram_chat_id }}" \
            --bot-token "${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            --output-file output.json
